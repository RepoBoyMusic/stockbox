{% extends "base.html" %}
{% block title %}Ingresar · StockBox{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="text-center mb-8">
    <div class="text-4xl mb-2">📦</div>
    <h1 class="text-2xl font-bold text-slate-900">StockBox</h1>
    <p class="text-sm text-slate-500 mt-1">Gestión de stock y depósito</p>
  </div>

  <form method="post" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
    <div>
      <label for="username" class="block text-sm font-medium mb-1">Usuario</label>
      <input type="text" name="username" id="username" required autofocus
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm
                    focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div>
      <label for="password" class="block text-sm font-medium mb-1">Contraseña</label>
      <input type="password" name="password" id="password" required
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm
                    focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium
                   rounded-lg py-2.5 text-sm transition-colors">
      Ingresar
    </button>
  </form>
</div>
{% endblock %}
