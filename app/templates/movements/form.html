{% extends "base.html" %}
{% block title %}Registrar movimiento · StockBox{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold text-slate-900 mb-6">Registrar movimiento</h1>

  {% if productos %}
  <form method="post" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">Producto *</label>
      <select name="product_id" id="product_id" required
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white
                     focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="" disabled {{ 'selected' if not producto_pre }}>Elegí un producto…</option>
        {% for p in productos %}
        <option value="{{ p.id }}" data-stock="{{ p.stock }}"
                {{ 'selected' if p.id == producto_pre }}>
          {{ p.nombre }} ({{ p.sku }})
        </option>
        {% endfor %}
      </select>
      <p id="stock-hint" class="text-xs text-slate-400 mt-1"></p>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1">Tipo *</label>
        <select name="tipo" required
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white
                       focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="entrada">↓ Entrada (suma stock)</option>
          <option value="salida">↑ Salida (resta stock)</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Motivo *</label>
        <select name="motivo" required
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white
                       focus:outline-none focus:ring-2 focus:ring-indigo-500">
          {% for m in motivos %}
          <option value="{{ m }}" class="capitalize">{{ m.capitalize() }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Cantidad *</label>
      <input type="number" name="cantidad" min="1" required placeholder="0"
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm
                    focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Nota <span class="text-slate-400">(opcional)</span></label>
      <input name="nota" placeholder="ej: reposición proveedor, venta mostrador…"
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm
                    focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg px-5 py-2.5 text-sm transition-colors">
        Registrar
      </button>
      <a href="{{ url_for('movements.index') }}"
         class="border border-slate-300 hover:bg-slate-50 text-slate-600 font-medium rounded-lg px-5 py-2.5 text-sm transition-colors">
        Cancelar
      </a>
    </div>
  </form>

  <script>
    // Muestra el stock actual del producto elegido (JS vanilla, sin librerías)
    const sel = document.getElementById('product_id');
    const hint = document.getElementById('stock-hint');
    function actualizarHint() {
      const opt = sel.selectedOptions[0];
      hint.textContent = (opt && opt.dataset.stock !== undefined)
        ? `Stock actual: ${opt.dataset.stock} unidades`
        : '';
    }
    sel.addEventListener('change', actualizarHint);
    actualizarHint();
  </script>

  {% else %}
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-10 text-center text-slate-400">
    No hay productos cargados.
    <a href="{{ url_for('products.crear') }}" class="text-indigo-600 font-medium">Creá uno primero</a>.
  </div>
  {% endif %}
</div>
{% endblock %}
