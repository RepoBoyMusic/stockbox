# Configuración de deploy para Render (https://render.com)
# El plan free tiene disco efímero: la base SQLite se resetea en cada deploy,
# por eso corremos seed.py al arrancar — la demo siempre tiene datos frescos.
# Para datos persistentes: definir DATABASE_URL apuntando a un Postgres.
services:
  - type: web
    name: stockbox
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && gunicorn "app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.4
